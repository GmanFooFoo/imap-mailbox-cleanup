services:
  greenmail:
    image: greenmail/standalone:2.1.0
    ports:
      - "3143:3143"   # IMAP (plain — avoids self-signed cert issues in tests)
      - "3025:3025"   # SMTP
    environment:
      GREENMAIL_OPTS: "-Dgreenmail.setup.test.imap -Dgreenmail.setup.test.smtp -Dgreenmail.users=test:test@localhost,work:workpw@localhost,private:privatepw@localhost -Dgreenmail.verbose -Dgreenmail.hostname=0.0.0.0"
